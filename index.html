<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>...</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #matrix3,
    #collage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #matrix3 {
      z-index: 0;
      pointer-events: none;
    }

    #collage {
      z-index: 1;
      background: transparent;
      touch-action: none;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      background: #000;
      color: rgb(136, 255, 69);
      font-family: "Arial Black", "Segoe UI", sans-serif;
      font-size: clamp(2.3rem, 9vw, 8rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      text-transform: none;
      opacity: 1;
      transition: opacity 900ms ease;
      pointer-events: none;
    }

    #intro.fade {
      opacity: 0;
    }

    #introText {
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: opacity 700ms ease, transform 700ms ease;
      padding: 0 1rem;
    }

    #introText.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  </style>
</head>
<body>
  <canvas id="matrix3" aria-hidden="true"></canvas>
  <canvas id="collage" aria-label="Колаж з кружечків"></canvas>
  <div id="intro" aria-live="polite">
    <div id="introText"></div>
  </div>

  <script>
    const bgCanvas = document.getElementById("matrix3");
    const bgCtx = bgCanvas.getContext("2d");
    const canvas = document.getElementById("collage");
    const ctx = canvas.getContext("2d");
    const intro = document.getElementById("intro");
    const introText = document.getElementById("introText");
    const imagePaths = [
      "imgs/IMG_0224.jpeg",
      "imgs/IMG_2008.jpeg",
      "imgs/IMG_3404.jpeg",
      "imgs/IMG_3432.jpeg",
      "imgs/IMG_3433.jpeg",
      "imgs/IMG_3434.jpeg",
      "imgs/IMG_3435.jpeg",
      "imgs/IMG_3436.jpeg",
      "imgs/IMG_3438.jpeg",
      "imgs/IMG_3439.jpeg",
      "imgs/IMG_3441.jpeg",
      "imgs/IMG_3442.jpeg",
      "imgs/IMG_3443.jpeg",
      "imgs/IMG_3444.jpeg",
      "imgs/IMG_3445.jpeg",
      "imgs/IMG_3446.jpeg",
      "imgs/IMG_3448.jpeg",
      "imgs/IMG_3449 2.jpeg",
      "imgs/IMG_3450.jpeg",
      "imgs/IMG_3451.jpeg",
      "imgs/IMG_3452.jpeg",
      "imgs/IMG_3453.jpeg",
      "imgs/IMG_3454.jpeg",
      "imgs/IMG_3455.jpeg",
      "imgs/IMG_3456.jpeg",
      "imgs/IMG_3457.jpeg",
      "imgs/IMG_3458.jpeg",
      "imgs/IMG_3459.jpeg",
      "imgs/IMG_3460.jpeg",
      "imgs/IMG_3461.jpeg",
      "imgs/IMG_3462.jpeg",
      "imgs/IMG_3463.jpeg",
      "imgs/IMG_3464.jpeg",
      "imgs/IMG_3466.jpeg",
      "imgs/IMG_3467.jpeg",
      "imgs/IMG_3469.jpeg",
      "imgs/IMG_3471.jpeg",
      "imgs/images.jpeg",
      "imgs/Знімок екрана 2026-04-23 о 00.01.27.png",
      "imgs/Знімок екрана 2026-04-23 о 00.23.21.png"
    ];

    const bubbles = [];
    const loadedImages = [];
    const threes = [];
    const pointer = { x: 0, y: 0, active: false };

    let w = 0;
    let h = 0;
    let cx = 0;
    let cy = 0;
    let spawned = 0;
    let showBackground = false;
    let showBubbles = false;

    let totalBubbles = imagePaths.length;
    const spawnGap = 1300;
    let hoverRadius = 120;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      bgCanvas.width = Math.floor(w * dpr);
      bgCanvas.height = Math.floor(h * dpr);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = w / 2;
      cy = h / 2;
      hoverRadius = Math.min(120, Math.min(w, h) * 0.24);
      initThrees();
    }

    function initThrees() {
      const targetCount = Math.max(14, Math.floor(w / 72));
      while (threes.length < targetCount) {
        threes.push({
          x: Math.random() * w,
          y: Math.random() * h,
          speed: 0.45 + Math.random() * 1.25,
          size: 12 + Math.random() * 18,
          alpha: 0.16 + Math.random() * 0.45,
          shade: Math.random() > 0.5 ? "57, 255, 20" : "136, 255, 69",
          text: Math.random() > 0.52 ? "months" : "3"
        });
      }
      if (threes.length > targetCount) {
        threes.length = targetCount;
      }
    }

    function createBubble(img, i) {
      const targetRadius = 34 + Math.random() * 52;
      const angle = Math.random() * Math.PI * 2;
      const push = 9 + i * 0.7;

      return {
        img,
        x: cx,
        y: cy,
        vx: Math.cos(angle) * push,
        vy: Math.sin(angle) * push,
        radius: targetRadius * 2.4,
        targetRadius,
        alpha: 0,
        hover: 0,
        seed: Math.random() * 1000
      };
    }

    function spawnNext() {
      if (spawned >= totalBubbles || spawned >= loadedImages.length) return;

      const bubble = createBubble(loadedImages[spawned], spawned);
      bubbles.push(bubble);
      spawned += 1;

      for (let i = 0; i < bubbles.length - 1; i += 1) {
        const b = bubbles[i];
        const dx = b.x - cx;
        const dy = b.y - cy;
        const dist = Math.hypot(dx, dy) || 1;
        const impulse = 2.2 + Math.random() * 1.5;
        b.vx += (dx / dist) * impulse;
        b.vy += (dy / dist) * impulse;
      }

      setTimeout(spawnNext, spawnGap);
    }

    function keepCentered(b, dt, t) {
      const dx = cx - b.x;
      const dy = cy - b.y;
      b.vx += dx * 0.00135 * dt;
      b.vy += dy * 0.00135 * dt;

      b.vx += Math.sin(t * 0.00055 + b.seed) * 0.11;
      b.vy += Math.cos(t * 0.00048 + b.seed * 0.8) * 0.11;
    }

    function solveCollisions() {
      for (let i = 0; i < bubbles.length; i += 1) {
        for (let j = i + 1; j < bubbles.length; j += 1) {
          const a = bubbles[i];
          const b = bubbles[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 0.001;
          const minDist = (a.radius + b.radius) * 0.96;

          if (dist < minDist) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = (minDist - dist) * 0.5;

            a.x -= nx * overlap;
            a.y -= ny * overlap;
            b.x += nx * overlap;
            b.y += ny * overlap;

            const kick = 0.07;
            a.vx -= nx * kick;
            a.vy -= ny * kick;
            b.vx += nx * kick;
            b.vy += ny * kick;
          }
        }
      }
    }

    function update(dt, t) {
      let hoveredIndex = -1;
      if (pointer.active) {
        for (let i = bubbles.length - 1; i >= 0; i -= 1) {
          const b = bubbles[i];
          const dx = pointer.x - b.x;
          const dy = pointer.y - b.y;
          if (Math.hypot(dx, dy) < b.radius * 1.05) {
            hoveredIndex = i;
            break;
          }
        }
      }

      for (let i = 0; i < bubbles.length; i += 1) {
        const b = bubbles[i];
        const dxp = pointer.x - b.x;
        const dyp = pointer.y - b.y;
        const d = Math.hypot(dxp, dyp);
        const hoverTarget = pointer.active && i === hoveredIndex && d < b.radius * 1.2 ? 1 : 0;
        b.hover += (hoverTarget - b.hover) * 0.12;

        b.alpha += (1 - b.alpha) * 0.018;

        const desiredRadius = b.targetRadius * (1 - b.hover) + hoverRadius * b.hover;
        b.radius += (desiredRadius - b.radius) * 0.035;

        keepCentered(b, dt, t);

        b.vx *= 0.945;
        b.vy *= 0.945;
        b.x += b.vx;
        b.y += b.vy;
      }

      solveCollisions();
    }

    function drawBubble(b) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.clip();

      const imgRatio = b.img.width / b.img.height;
      let drawW = b.radius * 2;
      let drawH = b.radius * 2;
      if (imgRatio > 1) {
        drawH = drawW / imgRatio;
      } else {
        drawW = drawH * imgRatio;
      }
      const fillScale = Math.max((b.radius * 2) / drawW, (b.radius * 2) / drawH) * 1.1;
      drawW *= fillScale;
      drawH *= fillScale;
      ctx.globalAlpha = 0.12 + b.alpha * 0.88;
      ctx.drawImage(b.img, b.x - drawW / 2, b.y - drawH / 2, drawW, drawH);
      ctx.restore();
    }

    function drawBackground() {
      bgCtx.clearRect(0, 0, w, h);
      for (const d of threes) {
        bgCtx.font = `${d.size}px monospace`;
        bgCtx.fillStyle = `rgba(${d.shade}, ${d.alpha})`;
        bgCtx.fillText(d.text, d.x, d.y);
      }
    }

    function updateBackground(dt) {
      for (const d of threes) {
        d.y += d.speed * dt * 3.2;
        if (d.y > h + d.size) {
          d.y = -d.size - Math.random() * 120;
          d.x = Math.random() * w;
          d.speed = 0.45 + Math.random() * 1.25;
          d.size = 12 + Math.random() * 18;
          d.alpha = 0.16 + Math.random() * 0.45;
          d.text = Math.random() > 0.52 ? "months" : "3";
        }
      }
    }

    function shuffleInPlace(items) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = items[i];
        items[i] = items[j];
        items[j] = tmp;
      }
    }

    async function preloadImages(paths) {
      const loaders = paths.map((path) => new Promise((resolve) => {
        const img = new Image();
        img.decoding = "async";
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = path;
      }));
      const images = await Promise.all(loaders);
      for (const img of images) {
        if (img) loadedImages.push(img);
      }
    }

    function render() {
      ctx.clearRect(0, 0, w, h);
      for (const b of bubbles) {
        drawBubble(b);
      }
    }

    let lastTs = 0;
    function tick(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 16.666, 2);
      lastTs = ts;

      if (showBackground) {
        updateBackground(dt);
        drawBackground();
      } else {
        bgCtx.clearRect(0, 0, w, h);
      }

      if (showBubbles) {
        update(dt, ts);
        render();
      } else {
        ctx.clearRect(0, 0, w, h);
      }

      requestAnimationFrame(tick);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function playIntro() {
      const sequence = ["3", "2", "1", "Happy", "3", "months", "of", "chatting!!!"];
      for (const part of sequence) {
        introText.classList.remove("show");
        await sleep(320);
        introText.textContent = part;
        introText.classList.add("show");
        await sleep(1200);
      }
      introText.classList.remove("show");
      await sleep(340);
      intro.classList.add("fade");
      await sleep(950);
      intro.style.display = "none";
    }

    function setPointer(clientX, clientY) {
      pointer.x = clientX;
      pointer.y = clientY;
      pointer.active = true;
    }

    canvas.addEventListener("mousemove", (e) => setPointer(e.clientX, e.clientY));
    canvas.addEventListener("mouseleave", () => {
      pointer.active = false;
    });

    canvas.addEventListener("touchstart", (e) => {
      if (!e.touches[0]) return;
      setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    canvas.addEventListener("touchmove", (e) => {
      if (!e.touches[0]) return;
      setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    canvas.addEventListener("touchend", () => {
      pointer.active = false;
    }, { passive: true });

    window.addEventListener("resize", resize);

    async function start() {
      resize();
      await preloadImages(imagePaths);
      if (!loadedImages.length) return;
      shuffleInPlace(loadedImages);
      totalBubbles = loadedImages.length;
      requestAnimationFrame(tick);
      await playIntro();
      showBackground = true;
      showBubbles = true;
      spawnNext();
    }

    start();
  </script>
</body>
</html>
