<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Привітання для Ані</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
      color: #ffd166; 
      font-family: 'Comfortaa', cursive;
      margin: 0;
      overflow: hidden;
    }

    #greeting {
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      line-height: 1.6;
      text-align: center;
      padding: 20px;
      /* Гарантуємо два рядки: */
      display: block;
      width: 100%;
      max-width: 600px;
      transition: all 0.8s ease-in-out;
      text-shadow: 0 0 20px rgba(255, 209, 102, 0.3);
    }

    /* Стиль для другого рядка, щоб він завжди починався з нового */
    .second-line {
      display: block;
      margin-top: 10px;
      font-size: 0.9em; /* Трохи менший для естетики */
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div id="greeting">Надобраніч Анюся,<span class="second-line">солодких тобі снів!</span></div>

  <script>
    // Список привітань, розділених символом "|" для точного переносу
    const otherGreetings = [
      "Good night Anya|sweet dreams!",
      "Bonne nuit Anya|fais de beaux rêves!",
      "Buenas noches Anya|dulces sueños!",
      "Gute Nacht Anya|süße Träume!",
      "Buona notte Anya|sogni d'oro!",
      "Boa noite Anya|sonhos doces!",
      "Dobranoc Aniu|kolorowych snów!",
      "God natt Anya|dröm sött!",
      "İyi geceler Anya|tatlı rüyalar!",
      "안녕히 주무세요 Anya|좋은 꿈 꾸세요!",
      "晚安 Anya|祝你做個好夢！",
      "おやすみなさい Anya|良い夢を！",
      "Goedenacht Anya|slaap lekker!",
      "God nat Anya|sov godt!",
      "Góða nótt Anya|dreymi þig vel!",
      "Hyvää yötä Anya|kauniita unia!",
      "Kala nyhta Anya|onira glika!",
      "शुभ रात्रि Anya|अच्छे सपने देखना!",
      "Laila tayyiba Anya|ahlam sa'ida!",
      "Noapte bună Anya|vise plăcute!",
      "Jó éjszakát Anya|szép álmokat!",
      "Laku noć Anya|sanjaj lepe snove!",
      "Sugeng dalu Anya|mimpi indah!",
      "Oíche mhaith Anya|codladh sámh!",
      "Usiku mwema Anya|ndoto tamu!",
      "God natt Anya|sov godt!",
      "Hamba kahle Anya|lala kahle!"
    ];

    const greetingDiv = document.getElementById("greeting");

    function updateGreeting() {
      greetingDiv.style.opacity = 0;
      greetingDiv.style.transform = "translateY(15px)";
      
      setTimeout(() => {
        // Вибираємо рандомну фразу
        const rawText = otherGreetings[Math.floor(Math.random() * otherGreetings.length)];
        
        // Розбиваємо по символу "|"
        const parts = rawText.split('|');
        
        // Формуємо HTML з двома блоками
        greetingDiv.innerHTML = `${parts[0]}<span class="second-line">${parts[1]}</span>`;
        
        greetingDiv.style.opacity = 1;
        greetingDiv.style.transform = "translateY(0)";
      }, 800);
    }

    // Запускаємо рандом кожні 4 секунди
    setInterval(updateGreeting, 4000);
  </script>
</body>
</html>
